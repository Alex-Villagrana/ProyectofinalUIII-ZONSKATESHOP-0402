<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SkateShop App">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SkateShop">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>SkateShop</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0D0D0D;
      overflow: hidden;
    }
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0D0D0D;
      z-index: 9999;
    }
    #loading.hide { display: none; }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #252525;
      border-top-color: #a80000;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      color: #999;
      font-family: sans-serif;
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Cargando SkateShop...</p>
  </div>

  <script>
    // Auto-hide loading spinner when Flutter canvas appears
    (function() {
      var el = document.getElementById('loading');
      var observer = new MutationObserver(function() {
        if (document.querySelector('flt-glass-pane, canvas')) {
          el.classList.add('hide');
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
      // Fallback: hide after 15s even if Flutter fails
      setTimeout(function() { el.classList.add('hide'); }, 15000);
    })();
  </script>

  <!-- Firebase JS SDK (pre-loaded for firebase_core web) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
